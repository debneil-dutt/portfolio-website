<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator - Debneil Dutt</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <style>
        :root {
            --bg-primary: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%);
            --bg-secondary: rgba(255, 255, 255, 0.05);
            --bg-card: rgba(255, 255, 255, 0.05);
            --text-primary: #ffffff;
            --text-secondary: #cccccc;
            --accent-primary: #00d4ff;
            --accent-secondary: #0099cc;
            --border-color: rgba(0, 212, 255, 0.3);
            --shadow-color: rgba(0, 212, 255, 0.2);
        }

        [data-theme="light"] {
            --bg-primary: linear-gradient(135deg, #f0f2f5 0%, #ffffff 50%, #e8eef7 100%);
            --bg-secondary: rgba(0, 0, 0, 0.05);
            --bg-card: rgba(0, 0, 0, 0.03);
            --text-primary: #2c3e50;
            --text-secondary: #555555;
            --accent-primary: #3498db;
            --accent-secondary: #2980b9;
            --border-color: rgba(52, 152, 219, 0.3);
            --shadow-color: rgba(52, 152, 219, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            cursor: none;
            transition: all 0.3s ease;
        }

        body.cursor-disabled { cursor: default; }

        /* Custom Cursor */
        .cursor {
            position: fixed;
            width: 20px;
            height: 20px;
            background: radial-gradient(circle, var(--accent-primary), var(--accent-secondary));
            border-radius: 50%;
            pointer-events: none;
            z-index: 10000;
            mix-blend-mode: difference;
            transition: transform 0.1s ease;
            opacity: 1;
        }

        .cursor.disabled { opacity: 0; }

        .cursor-trail {
            position: fixed;
            width: 8px;
            height: 8px;
            background: rgba(0, 212, 255, 0.5);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            opacity: 1;
            transition: opacity 0.3s ease;
        }

        .cursor-trail.disabled { opacity: 0; }

        /* Settings Panel */
        .settings-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1001;
            background: var(--bg-card);
            border: 2px solid var(--border-color);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .settings-toggle:hover {
            transform: rotate(90deg);
            box-shadow: 0 0 20px var(--shadow-color);
        }

        .settings-panel {
            position: fixed;
            top: 80px;
            right: 20px;
            z-index: 1000;
            background: var(--bg-card);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border-color);
            border-radius: 15px;
            padding: 25px;
            min-width: 280px;
            max-height: 70vh;
            overflow-y: auto;
            transform: translateX(100%);
            opacity: 0;
            transition: all 0.3s ease;
        }

        .settings-panel.active {
            transform: translateX(0);
            opacity: 1;
        }

        .setting-group {
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .setting-group:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }

        .setting-group h4 {
            color: var(--accent-primary);
            margin-bottom: 15px;
            font-size: 0.9rem;
        }

        .setting-item {
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .setting-item label {
            color: var(--text-primary);
            font-size: 0.85rem;
            flex: 1;
        }

        .toggle-switch {
            position: relative;
            width: 45px;
            height: 22px;
            background: var(--bg-secondary);
            border-radius: 25px;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .toggle-switch.active { background: var(--accent-primary); }

        .toggle-switch::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 18px;
            height: 18px;
            background: white;
            border-radius: 50%;
            transition: transform 0.3s ease;
        }

        .toggle-switch.active::after { transform: translateX(23px); }

        .color-picker {
            width: 40px;
            height: 25px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        /* Back Button */
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1001;
            background: var(--bg-card);
            border: 2px solid var(--border-color);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            text-decoration: none;
            color: var(--text-primary);
            font-size: 1.2rem;
        }

        .back-btn:hover {
            transform: translateX(-5px);
            box-shadow: 0 0 20px var(--shadow-color);
            color: var(--text-primary);
        }

        /* Background Animation */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .floating-element {
            position: absolute;
            width: 60px;
            height: 60px;
            background: linear-gradient(45deg, var(--shadow-color), var(--border-color));
            border-radius: 50%;
            animation: float 6s ease-in-out infinite;
        }

        .floating-element:nth-child(1) { top: 20%; left: 10%; animation-delay: 0s; }
        .floating-element:nth-child(2) { top: 60%; left: 80%; animation-delay: 2s; }
        .floating-element:nth-child(3) { top: 80%; left: 20%; animation-delay: 4s; }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(180deg); }
        }

        /* Main Container */
        .container {
            min-height: 100vh;
            padding: 100px 50px 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .qr-container {
            max-width: 1200px;
            width: 100%;
            background: var(--bg-card);
            backdrop-filter: blur(15px);
            border-radius: 25px;
            padding: 40px;
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 40px var(--shadow-color);
        }

        .hero {
            text-align: center;
            margin-bottom: 40px;
        }

        .hero h1 {
            font-size: 3rem;
            background: linear-gradient(45deg, var(--accent-primary), var(--text-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { filter: drop-shadow(0 0 10px var(--shadow-color)); }
            to { filter: drop-shadow(0 0 20px var(--shadow-color)); }
        }

        .hero p {
            font-size: 1.2rem;
            color: var(--text-secondary);
        }

        .qr-controls {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .input-section, .customization-section, .advanced-section {
            background: var(--bg-secondary);
            padding: 25px;
            border-radius: 15px;
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
        }

        .input-section:hover, .customization-section:hover, .advanced-section:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px var(--shadow-color);
        }

        .input-section h3, .customization-section h3, .advanced-section h3 {
            margin-bottom: 20px;
            color: var(--accent-primary);
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: var(--accent-primary);
            font-weight: 600;
        }

        .input-group input, .input-group textarea, .input-group select {
            width: 100%;
            padding: 12px;
            background: var(--bg-card);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .input-group input:focus, .input-group textarea:focus, .input-group select:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 15px var(--shadow-color);
        }

        .generate-btn {
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 10px 5px;
        }

        .generate-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 24px rgba(255, 107, 107, 0.4);
        }

        .qr-output {
            text-align: center;
            margin-top: 30px;
            padding: 30px;
            background: var(--bg-secondary);
            border-radius: 15px;
            min-height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px dashed var(--border-color);
            flex-direction: column;
            transition: all 0.3s ease;
        }

        .qr-output:hover {
            border-color: var(--accent-primary);
        }

        .range-input {
            width: 100%;
            margin: 10px 0;
        }

        .range-value {
            display: inline-block;
            margin-left: 10px;
            font-weight: 600;
            color: var(--accent-primary);
        }

        /* Footer */
        .footer {
            background: var(--bg-secondary);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--border-color);
            padding: 30px 20px;
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 50px;
        }

        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
        }

        .footer-text {
            margin-bottom: 10px;
        }

        .footer-copyright {
            font-size: 0.8rem;
            opacity: 0.8;
        }

        /* Responsive Design */
        @media (max-width: 1024px) {
            .qr-controls { grid-template-columns: 1fr; }
        }

        @media (max-width: 768px) {
            .container { padding: 100px 20px 30px; }
            .hero h1 { font-size: 2.5rem; }
            .qr-container { padding: 30px 20px; }
            .settings-panel { right: 10px; min-width: 250px; }
        }
    </style>
</head>
<body>
    <!-- Custom Cursor -->
    <div class="cursor"></div>
    
    <!-- Back Button -->
    <a href="index.html" class="back-btn" title="Back to Portfolio">←</a>
    
    <!-- Settings -->
    <div class="settings-toggle" onclick="toggleSettings()">⚙️</div>
    <div class="settings-panel" id="settingsPanel">
        <div class="setting-group">
            <h4>🎨 Theme Settings</h4>
            <div class="setting-item">
                <label>Dark Mode</label>
                <div class="toggle-switch active" id="themeToggle" onclick="toggleTheme()"></div>
            </div>
        </div>

        <div class="setting-group">
            <h4>🎨 Color Customization</h4>
            <div class="setting-item">
                <label>Primary Accent</label>
                <input type="color" class="color-picker" id="primaryColor" value="#00d4ff" onchange="updateColors()">
            </div>
            <div class="setting-item">
                <label>Secondary Accent</label>
                <input type="color" class="color-picker" id="secondaryColor" value="#0099cc" onchange="updateColors()">
            </div>
        </div>

        <div class="setting-group">
            <h4>💫 Effects</h4>
            <div class="setting-item">
                <label>Mouse Trail</label>
                <div class="toggle-switch active" id="trailToggle" onclick="toggleMouseTrail()"></div>
            </div>
            <div class="setting-item">
                <label>Animations</label>
                <div class="toggle-switch active" id="animationToggle" onclick="toggleAnimations()"></div>
            </div>
        </div>

        <div class="setting-group">
            <h4>🔧 Reset</h4>
            <button class="generate-btn" onclick="resetSettings()" style="width: 100%; margin: 0;">Reset to Default</button>
        </div>
    </div>
    
    <!-- Background Animation -->
    <div class="bg-animation">
        <div class="floating-element"></div>
        <div class="floating-element"></div>
        <div class="floating-element"></div>
    </div>

    <div class="container">
        <div class="qr-container">
            <div class="hero">
                <h1>🔍 QR Code Generator</h1>
                <p>Create customizable QR codes for your needs</p>
            </div>
            
            <div class="qr-controls">
                <div class="input-section">
                    <h3 style="margin-bottom: 20px; color: var(--accent-primary);">📝 Input Data</h3>
                    
                    <div class="input-group">
                        <label for="qr-text">Content:</label>
                        <textarea id="qr-text" placeholder="Enter your text, URL, or data here..." rows="4"></textarea>
                    </div>
                    
                    <div class="input-group">
                        <label for="qr-type">Data Type:</label>
                        <select id="qr-type">
                            <option value="text">Plain Text</option>
                            <option value="url">Website URL</option>
                            <option value="email">Email Address</option>
                            <option value="phone">Phone Number</option>
                        </select>
                    </div>
                </div>
                
                <div class="customization-section">
                    <h3 style="margin-bottom: 20px; color: var(--accent-primary);">🎨 Settings</h3>
                    
                    <div class="input-group">
                        <label for="qr-size">Size: <span id="size-value" class="range-value">300px</span></label>
                        <input type="range" id="qr-size" class="range-input" min="150" max="600" value="300">
                    </div>
                    
                    <div class="input-group">
                        <label for="qr-margin">Margin: <span id="margin-value" class="range-value">4</span></label>
                        <input type="range" id="qr-margin" class="range-input" min="0" max="15" value="4">
                    </div>
                    
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <div class="input-group">
                            <label for="qr-fg-color">Foreground:</label>
                            <input type="color" id="qr-fg-color" value="#000000" class="color-picker">
                        </div>
                        
                        <div class="input-group">
                            <label for="qr-bg-color">Background:</label>
                            <input type="color" id="qr-bg-color" value="#ffffff" class="color-picker">
                        </div>
                    </div>
                </div>

                <div class="advanced-section">
                    <h3 style="margin-bottom: 20px; color: var(--accent-primary);">⚙️ Advanced</h3>
                    
                    <div class="input-group">
                        <label for="qr-error-level">Error Correction:</label>
                        <select id="qr-error-level">
                            <option value="L">Low (~7%)</option>
                            <option value="M" selected>Medium (~15%)</option>
                            <option value="Q">Quartile (~25%)</option>
                            <option value="H">High (~30%)</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label for="qr-border">Border: <span id="border-value" class="range-value">0px</span></label>
                        <input type="range" id="qr-border" class="range-input" min="0" max="20" value="0">
                    </div>

                    <div class="input-group">
                        <label for="qr-border-color">Border Color:</label>
                        <input type="color" id="qr-border-color" value="#000000" class="color-picker">
                    </div>
                </div>
            </div>
            
            <div style="text-align: center;">
                <button class="generate-btn" onclick="generateQR()">🔄 Generate QR Code</button>
                <button class="generate-btn" onclick="downloadQR()">📥 Download</button>
            </div>
            
            <div class="qr-output" id="qr-output">
                <p style="color: var(--text-secondary);">Your QR code will appear here...</p>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        <div class="footer-content">
            <div class="footer-text">Made by Debneil Dutt</div>
            <div class="footer-copyright">ALL RIGHTS RESERVED 2025</div>
        </div>
    </div>

    <script>
        // Global variables
        let mouseTrailEnabled = true;
        let animationsEnabled = true;
        let isDarkMode = true;
        const cursor = document.querySelector('.cursor');
        const trails = [];
        let mouseX = 0, mouseY = 0;
        let qrInstance;

        // Create trail elements
        for (let i = 0; i < 15; i++) {
            const trail = document.createElement('div');
            trail.className = 'cursor-trail';
            document.body.appendChild(trail);
            trails.push({
                element: trail,
                x: 0,
                y: 0,
                opacity: 1 - (i * 0.06)
            });
        }

        // Settings functions
        function toggleSettings() {
            document.getElementById('settingsPanel').classList.toggle('active');
        }

        function toggleTheme() {
            const toggle = document.getElementById('themeToggle');
            isDarkMode = !isDarkMode;
            toggle.classList.toggle('active');
            
            if (isDarkMode) {
                document.body.removeAttribute('data-theme');
            } else {
                document.body.setAttribute('data-theme', 'light');
            }
            localStorage.setItem('theme', isDarkMode ? 'dark' : 'light');
        }

        function toggleMouseTrail() {
            const toggle = document.getElementById('trailToggle');
            mouseTrailEnabled = !mouseTrailEnabled;
            toggle.classList.toggle('active');
            
            if (mouseTrailEnabled) {
                cursor.classList.remove('disabled');
                trails.forEach(trail => trail.element.classList.remove('disabled'));
                document.body.classList.remove('cursor-disabled');
            } else {
                cursor.classList.add('disabled');
                trails.forEach(trail => trail.element.classList.add('disabled'));
                document.body.classList.add('cursor-disabled');
            }
            localStorage.setItem('mouseTrail', mouseTrailEnabled);
        }

        function toggleAnimations() {
            const toggle = document.getElementById('animationToggle');
            animationsEnabled = !animationsEnabled;
            toggle.classList.toggle('active');
            
            if (!animationsEnabled) {
                const style = document.createElement('style');
                style.textContent = '*, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }';
                document.head.appendChild(style);
            }
            localStorage.setItem('animations', animationsEnabled);
        }

        function updateColors() {
            const primaryColor = document.getElementById('primaryColor').value;
            const secondaryColor = document.getElementById('secondaryColor').value;
            
            document.documentElement.style.setProperty('--accent-primary', primaryColor);
            document.documentElement.style.setProperty('--accent-secondary', secondaryColor);
            
            localStorage.setItem('primaryColor', primaryColor);
            localStorage.setItem('secondaryColor', secondaryColor);
        }

        function resetSettings() {
            document.getElementById('primaryColor').value = '#00d4ff';
            document.getElementById('secondaryColor').value = '#0099cc';
            document.getElementById('themeToggle').classList.add('active');
            document.getElementById('trailToggle').classList.add('active');
            document.getElementById('animationToggle').classList.add('active');
            
            isDarkMode = true;
            mouseTrailEnabled = true;
            animationsEnabled = true;
            
            document.body.removeAttribute('data-theme');
            updateColors();
            localStorage.clear();
        }

        // Mouse tracking
        document.addEventListener('mousemove', (e) => {
            if (!mouseTrailEnabled) return;
            mouseX = e.clientX;
            mouseY = e.clientY;
            cursor.style.left = mouseX - 10 + 'px';
            cursor.style.top = mouseY - 10 + 'px';
        });

        // Animate trails
        function animateTrails() {
            if (!mouseTrailEnabled) {
                requestAnimationFrame(animateTrails);
                return;
            }
            
            let currentX = mouseX;
            let currentY = mouseY;
            
            trails.forEach((trail, index) => {
                trail.x += (currentX - trail.x) * 0.3;
                trail.y += (currentY - trail.y) * 0.3;
                
                trail.element.style.left = trail.x - 4 + 'px';
                trail.element.style.top = trail.y - 4 + 'px';
                trail.element.style.opacity = trail.opacity;
                
                currentX = trail.x;
                currentY = trail.y;
            });
            
            requestAnimationFrame(animateTrails);
        }
        animateTrails();

        // QR Generator Functions
        function formatDataByType(text, type) {
            switch(type) {
                case 'url': return text.startsWith('http') ? text : 'https://' + text;
                case 'email': return 'mailto:' + text;
                case 'phone': return 'tel:' + text;
                default: return text;
            }
        }

        function generateQR() {
            const text = document.getElementById('qr-text').value.trim();
            const type = document.getElementById('qr-type').value;
            const size = document.getElementById('qr-size').value;
            const margin = document.getElementById('qr-margin').value;
            const errorLevel = document.getElementById('qr-error-level').value;
            const fgColor = document.getElementById('qr-fg-color').value;
            const bgColor = document.getElementById('qr-bg-color').value;
            const borderWidth = document.getElementById('qr-border').value;
            const borderColor = document.getElementById('qr-border-color').value;
            const output = document.getElementById('qr-output');
            
            if (!text) {
                alert('Please enter text or content!');
                return;
            }
            
            const content = formatDataByType(text, type);
            output.innerHTML = '';
            
            try {
                const canvas = document.createElement('canvas');
                qrInstance = new QRious({
                    element: canvas,
                    value: content,
                    size: parseInt(size),
                    padding: parseInt(margin),
                    level: errorLevel,
                    foreground: fgColor,
                    background: bgColor
                });
                
                if (borderWidth > 0) {
                    canvas.style.border = `${borderWidth}px solid ${borderColor}`;
                }
                
                canvas.style.borderRadius = '10px';
                canvas.style.boxShadow = '0 0 20px var(--shadow-color)';
                
                output.appendChild(canvas);
                
                const infoDiv = document.createElement('div');
                infoDiv.style.marginTop = '15px';
                infoDiv.style.fontSize = '0.9rem';
                infoDiv.style.color = 'var(--text-secondary)';
                infoDiv.innerHTML = `
                    <p><strong>Size:</strong> ${size}x${size}px | <strong>Generated:</strong> ${new Date().toLocaleString()}</p>
                `;
                output.appendChild(infoDiv);
                
            } catch (error) {
                output.innerHTML = `<p style="color: #ff6b6b;">Error: ${error.message}</p>`;
            }
        }

        function downloadQR() {
            if (!qrInstance) {
                alert('Please generate a QR code first!');
                return;
            }
            
            const canvas = document.querySelector('#qr-output canvas');
            const link = document.createElement('a');
            link.download = `qr_code_${Date.now()}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        // Update range values
        ['qr-size', 'qr-margin', 'qr-border'].forEach(id => {
            document.getElementById(id).addEventListener('input', function() {
                const valueId = id.replace('qr-', '') + '-value';
                const unit = id === 'qr-margin' ? '' : 'px';
                document.getElementById(valueId).textContent = this.value + unit;
            });
        });

        // Load settings on page load
        document.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('theme');
            const savedMouseTrail = localStorage.getItem('mouseTrail');
            const savedAnimations = localStorage.getItem('animations');
            const savedPrimaryColor = localStorage.getItem('primaryColor');
            const savedSecondaryColor = localStorage.getItem('secondaryColor');
            
            if (savedTheme === 'light') {
                isDarkMode = false;
                document.body.setAttribute('data-theme', 'light');
                document.getElementById('themeToggle').classList.remove('active');
            }
            
            if (savedMouseTrail === 'false') {
                mouseTrailEnabled = false;
                document.getElementById('trailToggle').classList.remove('active');
                toggleMouseTrail();
            }
            
            if (savedAnimations === 'false') {
                animationsEnabled = false;
                document.getElementById('animationToggle').classList.remove('active');
                toggleAnimations();
            }
            
            if (savedPrimaryColor) {
                document.getElementById('primaryColor').value = savedPrimaryColor;
            }
            if (savedSecondaryColor) {
                document.getElementById('secondaryColor').value = savedSecondaryColor;
            }
            
            if (savedPrimaryColor || savedSecondaryColor) {
                updateColors();
            }
        });

        // Close settings when clicking outside
        document.addEventListener('click', (e) => {
            const settingsPanel = document.getElementById('settingsPanel');
            const settingsToggle = document.querySelector('.settings-toggle');
            
            if (!settingsPanel.contains(e.target) && !settingsToggle.contains(e.target)) {
                settingsPanel.classList.remove('active');
            }
        });
    </script>
</body>
</html>
