<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Map - Debneil Dutt</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg-primary: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 50%, #000000 100%);
            --bg-secondary: rgba(255, 255, 255, 0.1);
            --bg-card: rgba(0, 0, 0, 0.8);
            --text-primary: #ffffff;
            --text-secondary: #e0e0e0;
            --accent-primary: #00d4ff;
            --accent-secondary: #0099cc;
            --border-color: rgba(255, 255, 255, 0.2);
            --shadow-color: rgba(0, 212, 255, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow: hidden;
            cursor: none;
            height: 100vh;
        }

        body.cursor-disabled { cursor: default; }

        /* Custom Cursor */
        .cursor {
            position: fixed;
            width: 20px;
            height: 20px;
            background: radial-gradient(circle, var(--accent-primary), var(--accent-secondary));
            border-radius: 50%;
            pointer-events: none;
            z-index: 10000;
            mix-blend-mode: difference;
            transition: transform 0.1s ease;
            opacity: 1;
        }

        .cursor-trail {
            position: fixed;
            width: 8px;
            height: 8px;
            background: rgba(0, 212, 255, 0.5);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            opacity: 1;
            transition: opacity 0.3s ease;
        }

        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(15px);
            border-bottom: 2px solid var(--border-color);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.5);
        }

        .header-title {
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(45deg, var(--accent-primary), var(--text-primary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .home-btn {
            background: linear-gradient(45deg, var(--accent-primary), var(--accent-secondary));
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            color: white;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .home-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px var(--shadow-color);
            color: white;
        }

        /* Map Container */
        .map-container {
            position: absolute;
            top: 70px;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg-card);
            border-top: 1px solid var(--border-color);
        }

        #map {
            width: 100%;
            height: 100%;
            border-radius: 0;
        }

        /* Search Panel */
        .search-panel {
            position: fixed;
            top: 90px;
            left: 20px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(15px);
            border: 2px solid var(--border-color);
            border-radius: 15px;
            padding: 20px;
            width: 320px;
            max-height: 70vh;
            overflow-y: auto;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
        }

        .search-section {
            margin-bottom: 25px;
        }

        .search-section h3 {
            color: var(--accent-primary);
            margin-bottom: 15px;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .search-input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .search-input::placeholder {
            color: var(--text-secondary);
            opacity: 0.8;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 15px var(--shadow-color);
        }

        .search-btn {
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            color: white;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            width: 100%;
        }

        .search-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(255, 107, 107, 0.4);
        }

        .quick-locations {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }

        .location-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--border-color);
            padding: 10px 12px;
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .location-btn:hover {
            background: var(--accent-primary);
            transform: translateY(-1px);
            box-shadow: 0 5px 15px var(--shadow-color);
        }

        /* Info Panel */
        .info-panel {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(15px);
            border: 2px solid var(--border-color);
            border-radius: 15px;
            padding: 20px;
            width: 300px;
            display: none;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
        }

        .info-panel.active {
            display: block;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                transform: translateY(100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .info-title {
            color: var(--accent-primary);
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .info-content {
            color: var(--text-primary);
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .info-content p {
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .info-content strong {
            color: var(--accent-primary);
        }

        .close-info {
            position: absolute;
            top: 10px;
            right: 15px;
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 5px;
            transition: color 0.3s ease;
        }

        .close-info:hover {
            color: var(--accent-primary);
        }

        /* Controls Panel */
        .controls-panel {
            position: fixed;
            top: 90px;
            right: 20px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(15px);
            border: 2px solid var(--border-color);
            border-radius: 15px;
            padding: 20px;
            width: 250px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
        }

        .control-section {
            margin-bottom: 20px;
        }

        .control-section h4 {
            color: var(--accent-primary);
            margin-bottom: 10px;
            font-size: 0.9rem;
        }

        .control-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--border-color);
            padding: 8px 12px;
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 0.8rem;
            cursor: pointer;
            margin: 5px 5px 5px 0;
            transition: all 0.3s ease;
        }

        .control-btn:hover, .control-btn.active {
            background: var(--accent-primary);
            color: white;
        }

        /* Loading overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(15, 15, 35, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            opacity: 1;
            transition: opacity 0.5s ease;
        }

        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid var(--border-color);
            border-top: 4px solid var(--accent-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            margin-top: 20px;
            color: var(--text-secondary);
            text-align: center;
        }

        /* Custom marker styles */
        .user-marker {
            background: var(--accent-primary);
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 3px solid white;
            box-shadow: 0 0 15px var(--shadow-color);
        }

        .search-marker {
            background: #ff6b6b;
            width: 15px;
            height: 15px;
            border-radius: 50%;
            border: 2px solid white;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .search-panel {
                left: 10px;
                width: calc(100vw - 20px);
                max-width: 300px;
            }
            
            .controls-panel {
                right: 10px;
                width: 200px;
            }
            
            .info-panel {
                right: 10px;
                left: 10px;
                width: auto;
            }
            
            .header {
                padding: 10px 15px;
            }
            
            .header-title {
                font-size: 1.2rem;
            }
            
            .home-btn {
                padding: 10px 20px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <!-- Custom Cursor -->
    <div class="cursor"></div>
    
    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div>
            <div class="loading-spinner"></div>
            <div class="loading-text">Loading World Map...</div>
        </div>
    </div>

    <!-- Header -->
    <div class="header">
        <div class="header-title">🌍 Interactive World Map</div>
        <a href="index.html" class="home-btn">
            🏠 Back to Portfolio
        </a>
    </div>

    <!-- Map Container -->
    <div class="map-container">
        <div id="map"></div>
    </div>

    <!-- Search Panel -->
    <div class="search-panel">
        <div class="search-section">
            <h3>🔍 Search Location</h3>
            <input type="text" id="searchInput" class="search-input" placeholder="Enter city, country, or landmark...">
            <button class="search-btn" onclick="searchLocation()">Search</button>
        </div>

        <div class="search-section">
            <h3>🌟 Quick Locations</h3>
            <div class="quick-locations">
                <button class="location-btn" onclick="goToLocation(40.7128, -74.0060, 'New York City')">New York</button>
                <button class="location-btn" onclick="goToLocation(51.5074, -0.1278, 'London')">London</button>
                <button class="location-btn" onclick="goToLocation(35.6762, 139.6503, 'Tokyo')">Tokyo</button>
                <button class="location-btn" onclick="goToLocation(48.8566, 2.3522, 'Paris')">Paris</button>
                <button class="location-btn" onclick="goToLocation(22.3072, 70.8022, 'Kolkata')">Kolkata</button>
                <button class="location-btn" onclick="goToLocation(28.6139, 77.2090, 'New Delhi')">Delhi</button>
                <button class="location-btn" onclick="goToLocation(-33.8688, 151.2093, 'Sydney')">Sydney</button>
                <button class="location-btn" onclick="goToLocation(37.7749, -122.4194, 'San Francisco')">San Francisco</button>
            </div>
        </div>

        <div class="search-section">
            <h3>📍 Your Location</h3>
            <button class="search-btn" onclick="findMyLocation()">📍 Locate Me</button>
        </div>
    </div>

    <!-- Controls Panel -->
    <div class="controls-panel">
        <div class="control-section">
            <h4>🗺️ Map Type</h4>
            <button class="control-btn active" id="streetBtn" onclick="changeMapType('street')">Street</button>
            <button class="control-btn" id="satelliteBtn" onclick="changeMapType('satellite')">Satellite</button>
            <button class="control-btn" id="terrainBtn" onclick="changeMapType('terrain')">Terrain</button>
        </div>

        <div class="control-section">
            <h4>🎛️ View Controls</h4>
            <button class="control-btn" onclick="resetView()">🌍 World View</button>
            <button class="control-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>
        </div>

        <div class="control-section">
            <h4>ℹ️ Map Info</h4>
            <div style="font-size: 0.8rem; color: var(--text-secondary); line-height: 1.4;">
                <p>Click anywhere on the map to get location details!</p>
            </div>
        </div>
    </div>

    <!-- Info Panel -->
    <div class="info-panel" id="infoPanel">
        <button class="close-info" onclick="closeInfo()">×</button>
        <div class="info-title" id="infoTitle">Location Info</div>
        <div class="info-content" id="infoContent">Click on a location to see details...</div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Global variables
        let map;
        let userMarker;
        let searchMarkers = [];
        let currentMapType = 'street';
        const cursor = document.querySelector('.cursor');
        const trails = [];
        let mouseX = 0, mouseY = 0;

        // Create trail elements
        for (let i = 0; i < 10; i++) {
            const trail = document.createElement('div');
            trail.className = 'cursor-trail';
            document.body.appendChild(trail);
            trails.push({
                element: trail,
                x: 0,
                y: 0,
                opacity: 1 - (i * 0.1)
            });
        }

        // Mouse tracking
        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            cursor.style.left = mouseX - 10 + 'px';
            cursor.style.top = mouseY - 10 + 'px';
        });

        // Animate trails
        function animateTrails() {
            let currentX = mouseX;
            let currentY = mouseY;
            
            trails.forEach((trail, index) => {
                trail.x += (currentX - trail.x) * 0.3;
                trail.y += (currentY - trail.y) * 0.3;
                
                trail.element.style.left = trail.x - 4 + 'px';
                trail.element.style.top = trail.y - 4 + 'px';
                trail.element.style.opacity = trail.opacity;
                
                currentX = trail.x;
                currentY = trail.y;
            });
            
            requestAnimationFrame(animateTrails);
        }
        animateTrails();

        // Map Layers
        const mapLayers = {
            street: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors',
                maxZoom: 19
            }),
            satellite: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                attribution: '© Esri, Maxar, GeoEye, Earthstar Geographics, CNES/Airbus DS, USDA, USGS, AeroGRID, IGN, and the GIS User Community',
                maxZoom: 19
            }),
            terrain: L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenTopoMap contributors',
                maxZoom: 17
            })
        };

        // Initialize map
        function initMap() {
            try {
                map = L.map('map', {
                    center: [20, 0],
                    zoom: 2,
                    minZoom: 1,
                    maxZoom: 18,
                    zoomControl: true,
                    worldCopyJump: true
                });

                // Add default layer with error handling
                mapLayers.street.addTo(map);
                
                // Add error handling for tile loading
                mapLayers.street.on('tileerror', function(error) {
                    console.warn('Tile loading error:', error);
                });

                // Add click event listener
                map.on('click', onMapClick);

                // Try to get user's location after a short delay
                setTimeout(() => {
                    findMyLocation();
                }, 1000);

                // Hide loading overlay
                setTimeout(() => {
                    const loadingOverlay = document.getElementById('loadingOverlay');
                    if (loadingOverlay) {
                        loadingOverlay.classList.add('hidden');
                    }
                }, 2000);
                
            } catch (error) {
                console.error('Map initialization error:', error);
                alert('Map failed to load. Please refresh the page.');
            }
        }

        // Handle map clicks
        function onMapClick(e) {
            const lat = e.latlng.lat.toFixed(6);
            const lng = e.latlng.lng.toFixed(6);
            
            try {
                // Simple location info without external API
                showLocationInfo({
                    title: 'Selected Location',
                    country: 'Click Details',
                    coordinates: `${lat}, ${lng}`,
                    details: [
                        `Latitude: ${lat}°`,
                        `Longitude: ${lng}°`,
                        `Zoom Level: ${map.getZoom()}`,
                        `Clicked at: ${new Date().toLocaleTimeString()}`
                    ]
                });
            } catch (error) {
                console.error('Map click error:', error);
                showLocationInfo({
                    title: 'Location',
                    country: 'Details unavailable',
                    coordinates: `${lat}, ${lng}`,
                    details: ['Click location information could not be retrieved']
                });
            }
        }

        // Show location information
        function showLocationInfo(info) {
            const panel = document.getElementById('infoPanel');
            const title = document.getElementById('infoTitle');
            const content = document.getElementById('infoContent');
            
            title.textContent = `📍 ${info.title}`;
            content.innerHTML = `
                <p><strong>Country:</strong> ${info.country}</p>
                <p><strong>Coordinates:</strong> ${info.coordinates}</p>
                ${info.details.map(detail => `<p>${detail}</p>`).join('')}
            `;
            
            panel.classList.add('active');
        }

        // Close info panel
        function closeInfo() {
            document.getElementById('infoPanel').classList.remove('active');
        }

        // Find user's location
        function findMyLocation() {
            if ('geolocation' in navigator) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const lat = position.coords.latitude;
                        const lng = position.coords.longitude;
                        
                        // Remove existing user marker
                        if (userMarker) {
                            map.removeLayer(userMarker);
                        }
                        
                        // Create custom marker
                        const userIcon = L.divIcon({
                            html: '<div class="user-marker"></div>',
                            className: 'custom-div-icon',
                            iconSize: [20, 20],
                            iconAnchor: [10, 10]
                        });
                        
                        userMarker = L.marker([lat, lng], { icon: userIcon })
                            .addTo(map)
                            .bindPopup('📍 You are here!')
                            .openPopup();
                        
                        map.setView([lat, lng], 10);
                        
                        showLocationInfo({
                            title: 'Your Location',
                            country: 'Current Position',
                            coordinates: `${lat.toFixed(6)}, ${lng.toFixed(6)}`,
                            details: [
                                `Accuracy: ±${position.coords.accuracy}m`,
                                `Timestamp: ${new Date(position.timestamp).toLocaleString()}`
                            ]
                        });
                    },
                    (error) => {
                        console.warn('Geolocation failed:', error.message);
                        alert('Could not get your location. Please enable location services or search for a city manually.');
                    },
                    {
                        enableHighAccuracy: true,
                        timeout: 10000,
                        maximumAge: 300000
                    }
                );
            } else {
                alert('Geolocation is not supported by your browser.');
            }
        }

        // Search for location
        function searchLocation() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) {
                alert('Please enter a location to search for.');
                return;
            }
            
            // Use Nominatim API with proper error handling
            fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=5&addressdetails=1`)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Search service unavailable');
                    }
                    return response.json();
                })
                .then(data => {
                    if (data.length === 0) {
                        alert('Location not found. Please try a different search term.');
                        return;
                    }
                    
                    // Clear existing search markers
                    searchMarkers.forEach(marker => map.removeLayer(marker));
                    searchMarkers = [];
                    
                    // Add markers for search results
                    data.forEach((result, index) => {
                        const lat = parseFloat(result.lat);
                        const lng = parseFloat(result.lon);
                        
                        const searchIcon = L.divIcon({
                            html: `<div class="search-marker"></div>`,
                            className: 'custom-div-icon',
                            iconSize: [15, 15],
                            iconAnchor: [7.5, 7.5]
                        });
                        
                        const marker = L.marker([lat, lng], { icon: searchIcon })
                            .addTo(map)
                            .bindPopup(`
                                <div style="color: #333; max-width: 200px;">
                                    <strong>${result.display_name.split(',').slice(0, 2).join(', ')}</strong><br>
                                    <small>Search Result ${index + 1}</small>
                                </div>
                            `);
                        
                        searchMarkers.push(marker);
                    });
                    
                    // Zoom to first result
                    const firstResult = data[0];
                    const lat = parseFloat(firstResult.lat);
                    const lng = parseFloat(firstResult.lon);
                    map.setView([lat, lng], 12);
                    
                    showLocationInfo({
                        title: firstResult.display_name.split(',')[0] || 'Search Result',
                        country: firstResult.display_name.split(',').slice(-1)[0] || 'Unknown',
                        coordinates: `${lat.toFixed(6)}, ${lng.toFixed(6)}`,
                        details: [
                            `Found ${data.length} result(s)`,
                            `Type: ${firstResult.type || 'Location'}`,
                            `Importance: ${firstResult.importance ? (firstResult.importance * 100).toFixed(1) + '%' : 'N/A'}`
                        ]
                    });
                    
                    // Clear search input
                    document.getElementById('searchInput').value = '';
                })
                .catch(error => {
                    console.error('Search failed:', error);
                    alert('Search failed. Please check your internet connection and try again.');
                });
        }

        // Go to specific location
        function goToLocation(lat, lng, name) {
            map.setView([lat, lng], 10);
            
            showLocationInfo({
                title: name,
                country: 'Quick Location',
                coordinates: `${lat.toFixed(6)}, ${lng.toFixed(6)}`,
                details: [
                    'Popular destination',
                    `Zoom level: ${map.getZoom()}`
                ]
            });
        }

        // Change map type
        function changeMapType(type) {
            // Remove current layer
            map.eachLayer((layer) => {
                if (layer._url) {
                    map.removeLayer(layer);
                }
            });
            
            // Add new layer
            mapLayers[type].addTo(map);
            currentMapType = type;
            
            // Update button states
            document.querySelectorAll('.control-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(type + 'Btn').classList.add('active');
        }

        // Reset view to world
        function resetView() {
            map.setView([20, 0], 2);
            closeInfo();
        }

        // Toggle fullscreen
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Handle Enter key in search input
        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                searchLocation();
            }
        });

        // Initialize map when page loads
        window.addEventListener('load', () => {
            setTimeout(initMap, 500);
        });

        // Handle fullscreen changes
        document.addEventListener('fullscreenchange', () => {
            setTimeout(() => {
                map.invalidateSize();
            }, 100);
        });
    </script>
</body>
</html>
